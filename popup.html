<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DL Path Manager</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Downloads</h1>
        <p id="summary">読み込み中</p>
      </div>
      <div class="topbar-actions">
        <button id="refreshButton" class="icon-button" type="button" title="更新" aria-label="更新">
          <span aria-hidden="true">↻</span>
        </button>
        <button id="closeButton" class="icon-button close-button" type="button" title="閉じる" aria-label="閉じる">
          <span aria-hidden="true">×</span>
        </button>
      </div>
    </header>

    <section class="filters" aria-label="表示設定">
      <label>
        件数
        <select id="limitSelect">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="250">250</option>
          <option value="500">500</option>
        </select>
      </label>
      <label>
        状態
        <select id="stateSelect">
          <option value="all" selected>すべて</option>
          <option value="complete">完了</option>
          <option value="interrupted">失敗</option>
          <option value="in_progress">進行中</option>
        </select>
      </label>
      <input id="searchInput" type="search" placeholder="ファイル名 / URL / パスで絞り込み" autocomplete="off">
    </section>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <main id="downloadList" class="download-list" aria-label="ダウンロード一覧"></main>

    <template id="downloadRowTemplate">
      <article class="download-row">
        <div class="file-icon" aria-hidden="true">↓</div>
        <div class="download-main">
          <div class="download-title-row">
            <h2 class="download-title"></h2>
            <span class="download-state"></span>
          </div>
          <div class="download-meta"></div>
          <div class="download-progress">
            <div class="progress-track">
              <div class="progress-fill"></div>
            </div>
            <div class="progress-text"></div>
          </div>
          <div class="download-path"></div>
          <div class="download-url"></div>
        </div>
        <div class="row-actions">
          <button class="copy-path" type="button">パス</button>
          <button class="copy-url" type="button">URL</button>
          <button class="show-folder" type="button">階層</button>
          <button class="open-file" type="button">実行</button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
